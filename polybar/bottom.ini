[colors]
background = #282A2E
foreground = #C5C8C6
primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/bottom]
monitor = ${env:MONITOR}

width = 100%
height = 32

bottom = true

background = #CC282A2E
foreground = ${colors.foreground}

radius = 10

line-size = 3pt

border-size = 0
border-color = #00000000

padding-left = 2
padding-right = 2

module-margin = 1

separator =
separator-foreground = ${colors.disabled}

font-0 = "JetBrainsMono Nerd Font:size=12;3"

wm-restack = i3
override-redirect = false

modules-left = powermenu xws
modules-center = xwindow
modules-right = media volume

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; WORKSPACES
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/xws]
type = internal/xworkspaces

format-padding = 1
pin-workspaces = true

label-active = %name%
label-active-underline = ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; POWERMENU
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/powermenu]
type = custom/text

content = ⏻
content-padding = 1

click-left = ~/projects/bashCheats/powerMenu.sh

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; WINDOW TITLE
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/xwindow]
type = internal/xwindow

format-padding = 2

label = %title:0:60:...%

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; MEDIA
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/media]
type = custom/script

exec = ~/.config/polybar/onsink.sh
interval = 0.1

format = <label>
format-padding = 1

label = %output%

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; VOLUME
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/volume]
type = internal/pulseaudio

format-volume = <label-volume>
format-muted = <label-muted>

#label-volume = %percentage%%
label-volume = %{A1:pavucontrol &:}%percentage%%%{A}

label-muted = muted

click-left = pavucontrol &
